apiVersion: v1
kind: ServiceAccount
metadata: { name: backoffice-ui, namespace: dev }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: backoffice-ui, namespace: dev }
spec:
    replicas: 1
    selector: { matchLabels: { app: backoffice-ui } }
    template:
        metadata: { labels: { app: backoffice-ui } }
        spec:
            serviceAccountName: backoffice-ui
            containers:
                - name: backoffice-ui
                  image: lebaoo12/yas-backoffice:main
                  ports: [{ containerPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata: { name: backoffice-ui, namespace: dev }
spec:
    selector: { app: backoffice-ui }
    ports: [{ name: http, port: 80, targetPort: 3000 }]
