apiVersion: v1
kind: ServiceAccount
metadata: { name: customer, namespace: dev }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: customer, namespace: dev }
spec:
    replicas: 1
    selector: { matchLabels: { app: customer } }
    template:
        metadata: { labels: { app: customer } }
        spec:
            serviceAccountName: customer
            containers:
                - name: customer
                  image: lebaoo12/yas-customer:main
                  ports: [{ containerPort: 8080 }]
                  env:
                      - {
                            name: SPRING_DATASOURCE_URL,
                            value: "jdbc:postgresql://postgres.default.svc.cluster.local:5432/dev_customer",
                        }
                      - { name: SPRING_DATASOURCE_USERNAME, value: "admin" }
                      - { name: SPRING_DATASOURCE_PASSWORD, value: "admin" }
                      - { name: SERVER_PORT, value: "8080" }
                      - {
                            name: SERVER_SERVLET_CONTEXT_PATH,
                            value: "/customer",
                        }
                      - {
                            name: YAS_SERVICES_LOCATION,
                            value: "http://location/location",
                        }
                      - { name: JAVA_TOOL_OPTIONS, value: "-Xmx512m" }
                  resources: { requests: { memory: "256Mi", cpu: "50m" } }
---
apiVersion: v1
kind: Service
metadata: { name: customer, namespace: dev }
spec:
    selector: { app: customer }
    ports: [{ name: http, port: 80, targetPort: 8080 }]
