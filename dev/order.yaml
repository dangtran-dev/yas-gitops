apiVersion: apps/v1
kind: Deployment
metadata:
    name: order
    namespace: dev
spec:
    replicas: 1
    selector:
        matchLabels:
            app: order
    template:
        metadata:
            labels:
                app: order
        spec:
            serviceAccountName: order
            containers:
                - name: order
                  image: lebaoo12/yas-order:main
                  ports:
                      - containerPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: order
    namespace: dev
---
apiVersion: v1
kind: Service
metadata:
    name: order
    namespace: dev
spec:
    selector:
        app: order
    ports:
        - port: 80
          targetPort: 8080
