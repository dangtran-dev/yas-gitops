apiVersion: apps/v1
kind: Deployment
metadata:
    name: storefront-bff
    namespace: dev
spec:
    replicas: 1
    selector:
        matchLabels:
            app: storefront-bff
    template:
        metadata:
            labels:
                app: storefront-bff
        spec:
            serviceAccountName: storefront-bff
            containers:
                - name: storefront-bff
                  image: lebaoo12/yas-storefront-bff:main
                  ports:
                      - containerPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: storefront-bff
    namespace: dev
---
apiVersion: v1
kind: Service
metadata:
    name: storefront-bff
    namespace: dev
spec:
    selector:
        app: storefront-bff
    ports:
        - port: 80
          targetPort: 8080
