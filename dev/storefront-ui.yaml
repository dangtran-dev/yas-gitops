apiVersion: apps/v1
kind: Deployment
metadata:
    name: storefront-ui
    namespace: dev
spec:
    replicas: 1
    selector:
        matchLabels:
            app: storefront-ui
    template:
        metadata:
            labels:
                app: storefront-ui
        spec:
            serviceAccountName: storefront-ui
            containers:
                - name: storefront-ui
                  image: lebaoo12/yas-storefront-ui:main
                  ports:
                      - containerPort: 3000
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: storefront-ui
    namespace: dev
---
apiVersion: v1
kind: Service
metadata:
    name: storefront-ui
    namespace: dev
spec:
    selector:
        app: storefront-ui
    ports:
        - port: 80
          targetPort: 3000
