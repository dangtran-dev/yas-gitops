apiVersion: v1
kind: ServiceAccount
metadata: { name: swagger-ui, namespace: dev }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: swagger-ui, namespace: dev }
spec:
    replicas: 1
    selector: { matchLabels: { app: swagger-ui } }
    template:
        metadata: { labels: { app: swagger-ui } }
        spec:
            serviceAccountName: swagger-ui
            containers:
                - name: swagger-ui
                  image: swaggerapi/swagger-ui:v5.17.14
                  ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: swagger-ui, namespace: dev }
spec:
    selector: { app: swagger-ui }
    ports: [{ name: http, port: 80, targetPort: 8080 }]
