apiVersion: apps/v1
kind: Deployment
metadata:
    name: tax
    namespace: dev
spec:
    replicas: 1
    selector:
        matchLabels:
            app: tax
    template:
        metadata:
            labels:
                app: tax
        spec:
            serviceAccountName: tax
            containers:
                - name: tax
                  image: lebaoo12/yas-tax:main
                  ports:
                      - containerPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: tax
    namespace: dev
---
apiVersion: v1
kind: Service
metadata:
    name: tax
    namespace: dev
spec:
    selector:
        app: tax
    ports:
        - port: 80
          targetPort: 8080
