apiVersion: apps/v1
kind: Deployment
metadata:
    name: backoffice-ui
    namespace: staging
spec:
    replicas: 1
    selector:
        matchLabels:
            app: backoffice-ui
    template:
        metadata:
            labels:
                app: backoffice-ui
        spec:
            serviceAccountName: backoffice-ui
            containers:
                - name: backoffice-ui
                  image: lebaoo12/yas-backoffice:main
                  ports:
                      - containerPort: 3000
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: backoffice-ui
    namespace: staging
---
apiVersion: v1
kind: Service
metadata:
    name: backoffice-ui
    namespace: staging
spec:
    selector:
        app: backoffice-ui
    ports:
        - port: 80
          targetPort: 3000
