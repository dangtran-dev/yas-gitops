apiVersion: v1
kind: ServiceAccount
metadata: { name: cart, namespace: staging }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: cart, namespace: staging }
spec:
    replicas: 1
    selector: { matchLabels: { app: cart } }
    template:
        metadata: { labels: { app: cart } }
        spec:
            serviceAccountName: cart
            containers:
                - name: cart
                  image: lebaoo12/yas-cart:main
                  ports: [{ containerPort: 8080 }]
                  env:
                      - {
                            name: SPRING_DATASOURCE_URL,
                            value: "jdbc:postgresql://postgres.default.svc.cluster.local:5432/staging_cart",
                        }
                      - { name: SPRING_DATASOURCE_USERNAME, value: "admin" }
                      - { name: SPRING_DATASOURCE_PASSWORD, value: "admin" }
                      - { name: SERVER_PORT, value: "8080" }
                      - { name: SERVER_SERVLET_CONTEXT_PATH, value: "/cart" }
                      - {
                            name: YAS_SERVICES_MEDIA,
                            value: "http://media/media",
                        }
                      - {
                            name: YAS_SERVICES_PRODUCT,
                            value: "http://product/product",
                        }
                      - { name: JAVA_TOOL_OPTIONS, value: "-Xmx512m" }
                  resources: { requests: { memory: "256Mi", cpu: "50m" } }
---
apiVersion: v1
kind: Service
metadata: { name: cart, namespace: staging }
spec:
    selector: { app: cart }
    ports: [{ name: http, port: 80, targetPort: 8080 }]
