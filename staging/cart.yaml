apiVersion: apps/v1
kind: Deployment
metadata:
    name: cart
    namespace: staging
spec:
    replicas: 1
    selector:
        matchLabels:
            app: cart
    template:
        metadata:
            labels:
                app: cart
        spec:
            serviceAccountName: cart
            containers:
                - name: cart
                  image: lebaoo12/yas-cart:main
                  ports:
                      - containerPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: cart
    namespace: staging
---
apiVersion: v1
kind: Service
metadata:
    name: cart
    namespace: staging
spec:
    selector:
        app: cart
    ports:
        - port: 80
          targetPort: 8080
