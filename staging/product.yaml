apiVersion: apps/v1
kind: Deployment
metadata:
    name: product
    namespace: staging
spec:
    replicas: 1
    selector:
        matchLabels:
            app: product
    template:
        metadata:
            labels:
                app: product
        spec:
            serviceAccountName: product
            containers:
                - name: product
                  image: lebaoo12/yas-product:main
                  ports:
                      - containerPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: product
    namespace: staging
---
apiVersion: v1
kind: Service
metadata:
    name: product
    namespace: staging
spec:
    selector:
        app: product
    ports:
        - port: 80
          targetPort: 8080
