apiVersion: apps/v1
kind: Deployment
metadata:
    name: search
    namespace: staging
spec:
    replicas: 1
    selector:
        matchLabels:
            app: search
    template:
        metadata:
            labels:
                app: search
        spec:
            serviceAccountName: search
            containers:
                - name: search
                  image: lebaoo12/yas-search:main
                  ports:
                      - containerPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: search
    namespace: staging
---
apiVersion: v1
kind: Service
metadata:
    name: search
    namespace: staging
spec:
    selector:
        app: search
    ports:
        - port: 80
          targetPort: 8080
